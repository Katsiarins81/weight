<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // ====================== –Э–Р–°–Ґ–†–Ю–Щ–Ъ–Ш SUPABASE ======================
    // вђЗпЄП –Ч–Р–Ь–Х–Э–Ш–Ґ–Х –Э–Р –Т–Р–®–Ш –Ф–Р–Э–Э–Ђ–Х (–Є–Ј Settings вЖТ API –≤–∞—И–µ–≥–Њ –њ—А–Њ–µ–Ї—В–∞) вђЗпЄП
    const SUPABASE_URL = "https://dumititxmlefeldvmvmg.supabase.co";
    const SUPABASE_ANON = "sb_publishable_WOtfNa5PZ5Cyb-zg5WUgwg_hagk9wX7";;
    // вђЖпЄПвђЖпЄПвђЖпЄПвђЖпЄПвђЖпЄПвђЖпЄПвђЖпЄПвђЖпЄПвђЖпЄПвђЖпЄПвђЖпЄПвђЖпЄПвђЖпЄПвђЖпЄПвђЖпЄПвђЖпЄПвђЖпЄПвђЖпЄПвђЖпЄПвђЖпЄПвђЖпЄПвђЖпЄПвђЖпЄП

    // –У–ї–Њ–±–∞–ї—М–љ—Л–µ –њ–µ—А–µ–Љ–µ–љ–љ—Л–µ
    let supabaseClient;
    let currentPerson = "tanya"; // "tanya" –Є–ї–Є "katya"
    let currentDate = new Date().toISOString().slice(0, 10);

    // DOM —Н–ї–µ–Љ–µ–љ—В—Л
    let tanyaBtn, katyaBtn, selectedDisplay, weightInput, dateInput, todayBtn, saveBtn, resetBtn, historyBody, statusDiv;

    // –Ш–љ–Є—Ж–Є–∞–ї–Є–Ј–∞—Ж–Є—П –њ–Њ—Б–ї–µ –Ј–∞–≥—А—Г–Ј–Ї–Є DOM
    document.addEventListener('DOMContentLoaded', async () => {
        // –Я–Њ–ї—Г—З–∞–µ–Љ –≤—Б–µ —Н–ї–µ–Љ–µ–љ—В—Л
        tanyaBtn = document.getElementById('tanyaButton');
        katyaBtn = document.getElementById('katyaButton');
        selectedDisplay = document.getElementById('selectedPersonDisplay');
        weightInput = document.getElementById('weightValue');
        dateInput = document.getElementById('dateInput');
        todayBtn = document.getElementById('todayButton');
        saveBtn = document.getElementById('saveWeightButton');
        resetBtn = document.getElementById('resetAllButton');
        historyBody = document.getElementById('historyTableBody');
        statusDiv = document.getElementById('statusMessage');

        // –£—Б—В–∞–љ–∞–≤–ї–Є–≤–∞–µ–Љ –і–∞—В—Г
        dateInput.value = currentDate;

        // –Э–∞–≤–µ—И–Є–≤–∞–µ–Љ –Њ–±—А–∞–±–Њ—В—З–Є–Ї–Є –њ–µ—А–µ–Ї–ї—О—З–µ–љ–Є—П –њ–µ—А—Б–Њ–љ—Л
        tanyaBtn.onclick = () => {
            currentPerson = "tanya";
            tanyaBtn.classList.add('active');
            katyaBtn.classList.remove('active');
            selectedDisplay.innerHTML = 'рЯОА –Ґ–∞–љ—О—И–Ї–∞';
            console.log("–Я–µ—А–µ–Ї–ї—О—З–µ–љ–Њ –љ–∞ –Ґ–∞–љ—О—И–Ї—Г");
        };
        katyaBtn.onclick = () => {
            currentPerson = "katya";
            katyaBtn.classList.add('active');
            tanyaBtn.classList.remove('active');
            selectedDisplay.innerHTML = 'рЯМЄ –Ъ–∞—В—О—И–Ї–∞';
            console.log("–Я–µ—А–µ–Ї–ї—О—З–µ–љ–Њ –љ–∞ –Ъ–∞—В—О—И–Ї—Г");
        };

        // –Ю–±—А–∞–±–Њ—В—З–Є–Ї–Є –і–∞—В—Л
        dateInput.onchange = () => { currentDate = dateInput.value; };
        todayBtn.onclick = () => {
            const today = new Date().toISOString().slice(0,10);
            currentDate = today;
            dateInput.value = today;
        };

        // –Я–Њ–і–Ї–ї—О—З–∞–µ–Љ Supabase
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
        
        // –Я—А–Њ–≤–µ—А—П–µ–Љ –њ–Њ–і–Ї–ї—О—З–µ–љ–Є–µ
        const { error: testError } = await supabaseClient.from('weight_records').select('id', { count: 'exact', head: true });
        if (testError) {
            statusDiv.innerHTML = `вЭМ –Ю—И–Є–±–Ї–∞ –њ–Њ–і–Ї–ї—О—З–µ–љ–Є—П: ${testError.message}. –Я—А–Њ–≤–µ—А—М—В–µ URL –Є anon key.`;
            statusDiv.style.background = "#fce4e4";
            return;
        }
        statusDiv.innerHTML = "вЬЕ –Я–Њ–і–Ї–ї—О—З–µ–љ–Њ –Ї Supabase";
        statusDiv.style.background = "#e6f4ea";

        // –Ч–∞–≥—А—Г–ґ–∞–µ–Љ –і–∞–љ–љ—Л–µ
        await loadData();

        // –Ъ–љ–Њ–њ–Ї–Є –і–µ–є—Б—В–≤–Є–є
        saveBtn.onclick = saveWeight;
        resetBtn.onclick = resetAllData;
    });

    // –Ч–∞–≥—А—Г–Ј–Ї–∞ –≤—Б–µ—Е –Ј–∞–њ–Є—Б–µ–є –Є –Њ—В—А–Є—Б–Њ–≤–Ї–∞ —В–∞–±–ї–Є—Ж—Л
    async function loadData() {
        try {
            const { data, error } = await supabaseClient
                .from('weight_records')
                .select('*')
                .order('date', { ascending: false });
            if (error) throw error;

            if (!data || data.length === 0) {
                historyBody.innerHTML = '<tr><td colspan="4" class="empty">рЯУ≠ –Э–µ—В –Ј–∞–њ–Є—Б–µ–є. –Ф–Њ–±–∞–≤—М—В–µ –њ–µ—А–≤—Г—О!</td></tr>';
                return;
            }

            // –У—А—Г–њ–њ–Є—А—Г–µ–Љ –њ–Њ –і–∞—В–∞–Љ
            const byDate = new Map();
            for (let rec of data) {
                if (!byDate.has(rec.date)) byDate.set(rec.date, { tanya: null, katya: null });
                byDate.get(rec.date)[rec.person] = rec;
            }

            // –Я–Њ–ї—Г—З–∞–µ–Љ –≤—Б–µ –і–∞—В—Л, —Б–Њ—А—В–Є—А—Г–µ–Љ –Њ—В –љ–Њ–≤—Л—Е –Ї —Б—В–∞—А—Л–Љ
            const dates = Array.from(byDate.keys()).sort((a,b) => b.localeCompare(a));
            
            // –Ф–ї—П –≤—Л—З–Є—Б–ї–µ–љ–Є—П –Є–Ј–Љ–µ–љ–µ–љ–Є–є –љ—Г–ґ–љ–Њ –Ј–љ–∞—В—М –њ—А–µ–і—Л–і—Г—Й–Є–µ –≤–µ—Б–∞ –і–ї—П –Ї–∞–ґ–і–Њ–є –њ–µ—А—Б–Њ–љ—Л
            // –°–љ–∞—З–∞–ї–∞ –њ–Њ–ї—Г—З–Є–Љ –≤—Б–µ –Ј–∞–њ–Є—Б–Є –њ–Њ –Ї–∞–ґ–і–Њ–є –њ–µ—А—Б–Њ–љ–µ –≤ –њ–Њ—А—П–і–Ї–µ –≤–Њ–Ј—А–∞—Б—В–∞–љ–Є—П
            const { data: tanyaAll } = await supabaseClient.from('weight_records').select('*').eq('person', 'tanya').order('date', { ascending: true });
            const { data: katyaAll } = await supabaseClient.from('weight_records').select('*').eq('person', 'katya').order('date', { ascending: true });
            
            const tanyaChanges = new Map(); // date -> –Є–Ј–Љ–µ–љ–µ–љ–Є–µ
            const katyaChanges = new Map();
            
            for (let i = 0; i < tanyaAll.length; i++) {
                if (i > 0) {
                    const diff = tanyaAll[i].weight - tanyaAll[i-1].weight;
                    tanyaChanges.set(tanyaAll[i].date, diff);
                }
            }
            for (let i = 0; i < katyaAll.length; i++) {
                if (i > 0) {
                    const diff = katyaAll[i].weight - katyaAll[i-1].weight;
                    katyaChanges.set(katyaAll[i].date, diff);
                }
            }

            let html = '';
            for (let date of dates) {
                const tanyaRec = byDate.get(date).tanya;
                const katyaRec = byDate.get(date).katya;
                
                let tanyaHtml = '';
                if (tanyaRec) {
                    const change = tanyaChanges.get(date);
                    let changeHtml = '';
                    if (change !== undefined) {
                        const changeAbs = Math.abs(change).toFixed(1);
                        const arrow = change > 0 ? 'вЦ≤' : (change < 0 ? 'вЦЉ' : 'вЧП');
                        const bgClass = change > 0 ? 'change-positive' : (change < 0 ? 'change-negative' : 'change-neutral');
                        changeHtml = `<div style="font-size:0.7rem; margin-top:4px; background:${change > 0 ? '#fce4e4' : (change < 0 ? '#e6f4ea' : '#fff0f0')}; color:${change > 0 ? '#c62828' : (change < 0 ? '#2e7d32' : '#b86b82')}; border-radius:20px; padding:2px 6px;">${arrow} ${changeAbs} –Ї–≥</div>`;
                    } else {
                        changeHtml = `<div style="font-size:0.7rem; margin-top:4px; background:#fff0f0; border-radius:20px; padding:2px 6px;">вЧП –њ–µ—А–≤–Њ–µ</div>`;
                    }
                    tanyaHtml = `<div><strong>${tanyaRec.weight} –Ї–≥</strong></div>${changeHtml}`;
                } else {
                    tanyaHtml = 'вАФ';
                }
                
                let katyaHtml = '';
                if (katyaRec) {
                    const change = katyaChanges.get(date);
                    let changeHtml = '';
                    if (change !== undefined) {
                        const changeAbs = Math.abs(change).toFixed(1);
                        const arrow = change > 0 ? 'вЦ≤' : (change < 0 ? 'вЦЉ' : 'вЧП');
                        changeHtml = `<div style="font-size:0.7rem; margin-top:4px; background:${change > 0 ? '#fce4e4' : (change < 0 ? '#e6f4ea' : '#fff0f0')}; color:${change > 0 ? '#c62828' : (change < 0 ? '#2e7d32' : '#b86b82')}; border-radius:20px; padding:2px 6px;">${arrow} ${changeAbs} –Ї–≥</div>`;
                    } else {
                        changeHtml = `<div style="font-size:0.7rem; margin-top:4px; background:#fff0f0; border-radius:20px; padding:2px 6px;">вЧП –њ–µ—А–≤–Њ–µ</div>`;
                    }
                    katyaHtml = `<div><strong>${katyaRec.weight} –Ї–≥</strong></div>${changeHtml}`;
                } else {
                    katyaHtml = 'вАФ';
                }
                
                const delBtn = `<button class="delete" data-date="${date}" data-tanya-id="${tanyaRec ? tanyaRec.id : ''}" data-katya-id="${katyaRec ? katyaRec.id : ''}">вЬХ</button>`;
                html += `<tr><td>${date}</td><td>${tanyaHtml}</td><td>${katyaHtml}</td><td>${delBtn}</td></tr>`;
            }
            historyBody.innerHTML = html;
            
            // –Э–∞–≤–µ—Б–Є—В—М —Г–і–∞–ї–µ–љ–Є–µ –љ–∞ –Ї–љ–Њ–њ–Ї–Є
            document.querySelectorAll('.delete').forEach(btn => {
                btn.onclick = async (e) => {
                    e.stopPropagation();
                    const date = btn.getAttribute('data-date');
                    const tanyaId = btn.getAttribute('data-tanya-id');
                    const katyaId = btn.getAttribute('data-katya-id');
                    if (!confirm(`–£–і–∞–ї–Є—В—М –≤—Б–µ –Ј–∞–њ–Є—Б–Є –Ј–∞ ${date}?`)) return;
                    if (tanyaId && tanyaId !== '') await supabaseClient.from('weight_records').delete().eq('id', tanyaId);
                    if (katyaId && katyaId !== '') await supabaseClient.from('weight_records').delete().eq('id', katyaId);
                    await loadData();
                };
            });
        } catch (err) {
            console.error(err);
            historyBody.innerHTML = `<tr><td colspan="4" class="empty">вЭМ –Ю—И–Є–±–Ї–∞ –Ј–∞–≥—А—Г–Ј–Ї–Є: ${err.message}</td></tr>`;
        }
    }

    // –°–Њ—Е—А–∞–љ–µ–љ–Є–µ –≤–µ—Б–∞
    async function saveWeight() {
        const weight = parseFloat(weightInput.value);
        if (isNaN(weight) || weight <= 0 || weight > 300) {
            alert('–Т–≤–µ–і–Є—В–µ –Ї–Њ—А—А–µ–Ї—В–љ—Л–є –≤–µ—Б (1-300 –Ї–≥)');
            return;
        }
        const date = dateInput.value;
        if (!date) {
            alert('–Т—Л–±–µ—А–Є—В–µ –і–∞—В—Г');
            return;
        }
        
        // –Я—А–Њ–≤–µ—А–Є–Љ, –µ—Б—В—М –ї–Є –Ј–∞–њ–Є—Б—М –љ–∞ —Н—В—Г –і–∞—В—Г –і–ї—П —Н—В–Њ–є –њ–µ—А—Б–Њ–љ—Л
        const { data: existing, error: checkErr } = await supabaseClient
            .from('weight_records')
            .select('id')
            .eq('person', currentPerson)
            .eq('date', date)
            .maybeSingle();
        
        if (checkErr) {
            alert('–Ю—И–Є–±–Ї–∞ –њ—А–Њ–≤–µ—А–Ї–Є: ' + checkErr.message);
            return;
        }
        
        if (existing && !confirm(`–Ч–∞–њ–Є—Б—М –љ–∞ ${date} –і–ї—П ${currentPerson === 'tanya' ? '–Ґ–∞–љ—О—И–Ї–Є' : '–Ъ–∞—В—О—И–Ї–Є'} —Г–ґ–µ –µ—Б—В—М (${existing.weight} –Ї–≥). –Ч–∞–Љ–µ–љ–Є—В—М?`)) {
            return;
        }
        
        if (existing) {
            await supabaseClient.from('weight_records').delete().eq('id', existing.id);
        }
        
        const { error: insertErr } = await supabaseClient
            .from('weight_records')
            .insert([{ person: currentPerson, date: date, weight: weight }]);
        
        if (insertErr) {
            alert('–Ю—И–Є–±–Ї–∞ —Б–Њ—Е—А–∞–љ–µ–љ–Є—П: ' + insertErr.message);
            return;
        }
        
        weightInput.value = '';
        await loadData();
        alert('вЬЕ –Т–µ—Б —Б–Њ—Е—А–∞–љ—С–љ');
    }

    // –°–±—А–Њ—Б –≤—Б–µ—Е –і–∞–љ–љ—Л—Е
    async function resetAllData() {
