<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дневник веса: Танюшка и Катюшка</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath fill='%23e86b8b' d='M50,30 C50,15 35,5 20,15 C5,25 5,45 20,55 L50,85 L80,55 C95,45 95,25 80,15 C65,5 50,15 50,30Z'/%3E%3C/svg%3E">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-180x180.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Helvetica Neue', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #fff5f9 0%, #ffe4ed 100%);
            padding: 24px 6px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 48px 32px 56px 32px;
            padding: 24px 10px 32px;
            box-shadow: 0 20px 40px rgba(236, 120, 144, 0.2);
            border: 1px solid #ffcddc;
        }
        h1 {
            text-align: center;
            background: linear-gradient(135deg, #e86b8b, #c73e5e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-size: 2rem;
        }
        .sub {
            text-align: center;
            color: #e68eaa;
            border-bottom: 1px dashed #ffb7cb;
            display: inline-block;
            width: auto;
            margin: 0 auto 28px;
            padding-bottom: 6px;
        }
        .status {
            background: #fff0f4;
            border-radius: 30px;
            padding: 8px 16px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 0.8rem;
            color: #bc5f7a;
        }
        .person-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .person-btn {
            flex: 1;
            background: white;
            border: 1px solid #ff8aab;
            padding: 14px 0;
            border-radius: 48px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #bc5f7a;
            cursor: pointer;
            transition: 0.2s;
        }
        .person-btn.active {
            background: #ff8aab;
            color: white;
        }

        .total-stats {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .stat-item {
            flex: 1;
            min-width: 120px;
            background: white;
            border-radius: 20px;
            padding: 14px 16px;
            text-align: center;
            border: 1px solid #ffe2ea;
            box-shadow: 0 2px 8px rgba(236, 120, 144, 0.1);
        }
        .stat-item .name {
            font-size: 0.8rem;
            color: #bc5f7a;
            font-weight: 600;
        }
        .stat-item .value {
            font-size: 1.6rem;
            font-weight: 700;
            margin-top: 4px;
        }
        .stat-item .value.positive {
            color: #c62828;
        }
        .stat-item .value.negative {
            color: #2e7d32;
        }
        .stat-item .value.zero {
            color: #b86b82;
        }
        .stat-item .sub-text {
            font-size: 0.65rem;
            color: #e6a1b7;
            margin-top: 2px;
        }

        .range-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .range-btn {
            background: white;
            border: 1px solid #ffcddc;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #bc5f7a;
            cursor: pointer;
            transition: 0.2s;
        }
        .range-btn.active {
            background: #ff8aab;
            color: white;
            border-color: #ff8aab;
        }
        .range-btn:hover {
            background: #ffe0e8;
        }
        .range-btn.active:hover {
            background: #ff8aab;
        }

        .custom-range {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 16px;
            padding: 10px 16px;
            background: #fff5f8;
            border-radius: 60px;
        }
        .custom-range label {
            font-size: 0.85rem;
            color: #bc5f7a;
            font-weight: 500;
        }
        .custom-range input[type="date"] {
            padding: 6px 10px;
            border-radius: 30px;
            border: 1px solid #ffcddc;
            background: white;
            font-size: 0.85rem;
        }
        .custom-range .apply-btn {
            background: #ff94b0;
            border: none;
            padding: 6px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }
        .custom-range .apply-btn:hover {
            background: #e86b8b;
        }

        .weight-card {
            background: white;
            border-radius: 36px;
            padding: 20px;
            margin-bottom: 28px;
            text-align: center;
            border: 1px solid #ffe2ea;
        }
        .selected-person {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .input-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 16px 0;
        }
        .input-area input {
            border: 2px solid #ffcddc;
            border-radius: 56px;
            padding: 12px 18px;
            font-size: 1.3rem;
            width: 140px;
            text-align: center;
        }
        .date-picker {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            background: #fff5f8;
            border-radius: 60px;
            padding: 8px 16px;
            width: fit-content;
            margin: 10px auto 0;
        }
        .date-picker button {
            background: #ff94b0;
            border: none;
            padding: 0 16px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        input#dateInput {
            padding: 8px 5px;
            border-radius: 56px;
            border: 2px solid #ffcddc;
        }
        .save-btn {
            background: linear-gradient(95deg, #ff8aab, #ff6085);
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            margin-top: 18px;
            width: 80%;
            cursor: pointer;
        }
        .history-section {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 32px;
            padding: 16px;
            border: 1px solid #ffcbdb;
            overflow-x: auto;
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .reset-btn {
            background: none;
            border: none;
            color: #e68eaa;
            text-decoration: underline;
            cursor: pointer;
        }
        .chart-btn {
            background: #ff94b0;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .chart-btn:hover {
            background: #e86b8b;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 8px;
            text-align: center;
            border-bottom: 1px solid #ffe2ea;
        }
        th {
            background: #fff0f4;
            color: #bc5f7a;
        }
        .delete {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #e68eaa;
        }
        .empty {
            text-align: center;
            padding: 28px;
            color: #e6a1b7;
        }
        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
            color: #e6a1b7;
        }
        .range-info {
            text-align: center;
            font-size: 0.75rem;
            color: #e6a1b7;
            margin-bottom: 12px;
        }

        /* Модальное окно для графика */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 40px;
            padding: 24px;
            max-width: 800px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 20px;
            font-size: 1.8rem;
            cursor: pointer;
            color: #e68eaa;
            background: none;
            border: none;
        }
        .modal-close:hover {
            color: #c94f70;
        }
        .chart-container {
            width: 100%;
            height: 400px;
        }

        @media (max-width: 480px) {
           
            .stat-item {
               width: 50%;
            }
            .range-selector {
                gap: 4px;
            }
            .range-btn {
                padding: 6px 12px;
                font-size: 0.75rem;
            }
            .custom-range {
                flex-direction: column;
                gap: 6px;
                border-radius: 30px;
                padding: 12px;
            }
            .custom-range input[type="date"] {
                width: 100%;
            }
            .modal-content {
                padding: 16px;
            }
            .chart-container {
                height: 300px;
            }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Дневник веса</h1>
    <div id="statusMessage" class="status">🔄 Проверка подключения...</div>

    <div class="person-buttons">
        <button id="tanyaButton" class="person-btn active">🎀 Танюшка</button>
        <button id="katyaButton" class="person-btn">🌸 Катюшка</button>
    </div>

    <div class="range-selector" id="rangeSelector">
        <button class="range-btn" data-range="week">📅 Неделя</button>
        <button class="range-btn" data-range="month">📅 Месяц</button>
        <button class="range-btn active" data-range="all">📅 Всё время</button>
        <button class="range-btn" data-range="custom">📅 Свои даты</button>
    </div>

    <div class="custom-range" id="customRange" style="display:none;">
        <label>от</label>
        <input type="date" id="dateFrom">
        <label>до</label>
        <input type="date" id="dateTo">
        <button class="apply-btn" id="applyCustomRange">Применить</button>
    </div>

    <div class="range-info" id="rangeInfo">📊 Показаны все записи</div>

    <div class="total-stats" id="totalStats">
        <div class="stat-item">
            <div class="name">🎀 Танюшка</div>
            <div class="value" id="tanyaTotalDiff">0.0 кг</div>
            <div class="sub-text" id="tanyaDays">за 0 дн</div>
        </div>
        <div class="stat-item">
            <div class="name">🌸 Катюшка</div>
            <div class="value" id="katyaTotalDiff">0.0 кг</div>
            <div class="sub-text" id="katyaDays">за 0 дн</div>
        </div>
    </div>

    <div class="weight-card">
        <div id="selectedPersonDisplay" class="selected-person">🎀 Танюшка</div>
        <div class="input-area">
            <input type="number" id="weightValue" step="0.1" placeholder="вес">
            <span>кг</span>
        </div>
        <div class="date-picker">
            <label> Дата:</label>
            <input type="date" id="dateInput">
            <button id="todayButton" style="display: none">Сегодня</button>
        </div>
        <button id="saveWeightButton" class="save-btn"> Сохранить вес</button>
    </div>

    <div class="history-section">
        <div class="history-header">
            <h3> История изменений</h3>
            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                <button id="chartButton" class="chart-btn">📈 График</button>
                <button id="resetAllButton" class="reset-btn">Очистить всё</button>
            </div>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr><th>📅 Дата</th><th>🎀 Танюшка</th><th>🌸 Катюшка</th><th></th></tr>
                </thead>
                <tbody id="historyTableBody">
                    <tr><td colspan="4" class="empty">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Модальное окно для графика -->
<div class="modal" id="chartModal">
    <div class="modal-content">
        <button class="modal-close" id="closeModalBtn">&times;</button>
        <h2 style="text-align:center; color:#bc5f7a; margin-bottom:16px;">Динамика веса</h2>
        <div class="chart-container">
            <canvas id="weightChart"></canvas>
        </div>
        <p style="text-align:center; font-size:0.7rem; color:#e6a1b7; margin-top:12px;">* График построен на основе выбранного диапазона</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    // ====================== НАСТРОЙКИ SUPABASE ======================
    const SUPABASE_URL = "https://dumititxmlefeldvmvmg.supabase.co";
    const SUPABASE_ANON = "sb_publishable_WOtfNa5PZ5Cyb-zg5WUgwg_hagk9wX7";
    // ================================================================

    let supabaseClient;
    let currentPerson = "tanya";
    let currentDate = new Date().toISOString().slice(0, 10);
    let currentRange = "all";
    let customFrom = null;
    let customTo = null;

    // DOM элементы
    let tanyaBtn, katyaBtn, selectedDisplay, weightInput, dateInput, todayBtn, saveBtn, resetBtn, historyBody, statusDiv;
    let tanyaTotalDiff, katyaTotalDiff, tanyaDays, katyaDays;
    let rangeBtns, customRangeDiv, dateFrom, dateTo, applyCustomBtn, rangeInfo;
    let chartButton, modal, closeModalBtn, chartCanvas, chartInstance = null;

    document.addEventListener('DOMContentLoaded', async () => {
        tanyaBtn = document.getElementById('tanyaButton');
        katyaBtn = document.getElementById('katyaButton');
        selectedDisplay = document.getElementById('selectedPersonDisplay');
        weightInput = document.getElementById('weightValue');
        dateInput = document.getElementById('dateInput');
        todayBtn = document.getElementById('todayButton');
        saveBtn = document.getElementById('saveWeightButton');
        resetBtn = document.getElementById('resetAllButton');
        historyBody = document.getElementById('historyTableBody');
        statusDiv = document.getElementById('statusMessage');
        tanyaTotalDiff = document.getElementById('tanyaTotalDiff');
        katyaTotalDiff = document.getElementById('katyaTotalDiff');
        tanyaDays = document.getElementById('tanyaDays');
        katyaDays = document.getElementById('katyaDays');
        rangeBtns = document.querySelectorAll('.range-btn');
        customRangeDiv = document.getElementById('customRange');
        dateFrom = document.getElementById('dateFrom');
        dateTo = document.getElementById('dateTo');
        applyCustomBtn = document.getElementById('applyCustomRange');
        rangeInfo = document.getElementById('rangeInfo');
        chartButton = document.getElementById('chartButton');
        modal = document.getElementById('chartModal');
        closeModalBtn = document.getElementById('closeModalBtn');
        chartCanvas = document.getElementById('weightChart');

        const today = new Date();
        const monthAgo = new Date(today);
        monthAgo.setDate(today.getDate() - 30);
        dateFrom.value = monthAgo.toISOString().slice(0, 10);
        dateTo.value = today.toISOString().slice(0, 10);

        dateInput.value = currentDate;

        tanyaBtn.onclick = () => {
            currentPerson = "tanya";
            tanyaBtn.classList.add('active');
            katyaBtn.classList.remove('active');
            selectedDisplay.innerHTML = '🎀 Танюшка';
        };
        katyaBtn.onclick = () => {
            currentPerson = "katya";
            katyaBtn.classList.add('active');
            tanyaBtn.classList.remove('active');
            selectedDisplay.innerHTML = '🌸 Катюшка';
        };

        rangeBtns.forEach(btn => {
            btn.onclick = () => {
                rangeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentRange = btn.dataset.range;
                if (currentRange === 'custom') {
                    customRangeDiv.style.display = 'flex';
                    if (customFrom && customTo) loadData();
                } else {
                    customRangeDiv.style.display = 'none';
                    loadData();
                }
            };
        });

        applyCustomBtn.onclick = () => {
            customFrom = dateFrom.value;
            customTo = dateTo.value;
            if (!customFrom || !customTo) { alert('Выберите обе даты'); return; }
            if (customFrom > customTo) { alert('Дата "от" не может быть позже даты "до"'); return; }
            loadData();
        };

        dateInput.onchange = () => { currentDate = dateInput.value; };
        todayBtn.onclick = () => {
            const today = new Date().toISOString().slice(0,10);
            currentDate = today;
            dateInput.value = today;
        };

        // Кнопка графика
        chartButton.onclick = () => {
            modal.style.display = 'flex';
            buildChart();
        };

        // Закрытие модального окна
        closeModalBtn.onclick = () => {
            modal.style.display = 'none';
            if (chartInstance) {
                chartInstance.destroy();
                chartInstance = null;
            }
        };
        window.onclick = (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
                if (chartInstance) {
                    chartInstance.destroy();
                    chartInstance = null;
                }
            }
        };

        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
        const { error: testError } = await supabaseClient.from('weight_records').select('id', { count: 'exact', head: true });
        if (testError) {
            statusDiv.innerHTML = `❌ Ошибка подключения: ${testError.message}`;
            statusDiv.style.background = "#fce4e4";
            return;
        }
        statusDiv.innerHTML = "✅ Подключено к Supabase";
        statusDiv.style.background = "#e6f4ea";

        await loadData();
        saveBtn.onclick = saveWeight;
        resetBtn.onclick = resetAllData;
    });

    function getRangeStartDate() {
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        if (currentRange === 'week') {
            const weekStart = new Date(today);
            weekStart.setDate(today.getDate() - 6);
            return weekStart.toISOString().slice(0, 10);
        } else if (currentRange === 'month') {
            const monthStart = new Date(today);
            monthStart.setMonth(today.getMonth() - 1);
            return monthStart.toISOString().slice(0, 10);
        } else if (currentRange === 'custom' && customFrom) {
            return customFrom;
        }
        return '1970-01-01';
    }

    function getRangeEndDate() {
        if (currentRange === 'custom' && customTo) {
            return customTo;
        }
        return new Date().toISOString().slice(0, 10);
    }

    function updateRangeInfo() {
        const start = getRangeStartDate();
        const end = getRangeEndDate();
        if (currentRange === 'all') rangeInfo.textContent = '📊 Показаны все записи';
        else if (currentRange === 'week') rangeInfo.textContent = `📊 Последние 7 дней (с ${start})`;
        else if (currentRange === 'month') rangeInfo.textContent = `📊 Последний месяц (с ${start})`;
        else if (currentRange === 'custom') rangeInfo.textContent = `📊 Период: ${start} — ${end}`;
    }

    function updateTotalStats(tanyaAll, katyaAll) {
        const rangeStart = getRangeStartDate();
        const rangeEnd = getRangeEndDate();
        const tanyaFiltered = tanyaAll.filter(r => r.date >= rangeStart && r.date <= rangeEnd);
        const katyaFiltered = katyaAll.filter(r => r.date >= rangeStart && r.date <= rangeEnd);

        function getDays(entries) {
            if (entries.length < 2) return 0;
            const first = entries[0];
            const last = entries[entries.length - 1];
            return Math.floor((new Date(last.date) - new Date(first.date)) / (1000 * 60 * 60 * 24));
        }

        function getDiff(entries) {
            if (entries.length < 2) return null;
            const first = entries[0];
            const last = entries[entries.length - 1];
            return last.weight - first.weight;
        }

        // Танюшка
        const tanyaDiff = getDiff(tanyaFiltered);
        const tanyaDaysCount = getDays(tanyaFiltered);
        if (tanyaDiff !== null) {
            const sign = tanyaDiff > 0 ? '+' : (tanyaDiff < 0 ? '-' : '');
            tanyaTotalDiff.textContent = `${sign}${Math.abs(tanyaDiff).toFixed(1)} кг`;
            tanyaTotalDiff.className = 'value ' + (tanyaDiff > 0 ? 'positive' : (tanyaDiff < 0 ? 'negative' : 'zero'));
        } else if (tanyaFiltered.length === 1) {
            tanyaTotalDiff.textContent = '0.0 кг';
            tanyaTotalDiff.className = 'value zero';
        } else {
            tanyaTotalDiff.textContent = '—';
            tanyaTotalDiff.className = 'value zero';
        }
        tanyaDays.textContent = tanyaFiltered.length >= 2 ? `за ${tanyaDaysCount} дн` : (tanyaFiltered.length === 1 ? 'за 0 дн' : 'нет данных');

        // Катюшка
        const katyaDiff = getDiff(katyaFiltered);
        const katyaDaysCount = getDays(katyaFiltered);
        if (katyaDiff !== null) {
            const sign = katyaDiff > 0 ? '+' : (katyaDiff < 0 ? '-' : '');
            katyaTotalDiff.textContent = `${sign}${Math.abs(katyaDiff).toFixed(1)} кг`;
            katyaTotalDiff.className = 'value ' + (katyaDiff > 0 ? 'positive' : (katyaDiff < 0 ? 'negative' : 'zero'));
        } else if (katyaFiltered.length === 1) {
            katyaTotalDiff.textContent = '0.0 кг';
            katyaTotalDiff.className = 'value zero';
        } else {
            katyaTotalDiff.textContent = '—';
            katyaTotalDiff.className = 'value zero';
        }
        katyaDays.textContent = katyaFiltered.length >= 2 ? `за ${katyaDaysCount} дн` : (katyaFiltered.length === 1 ? 'за 0 дн' : 'нет данных');
    }

    // Функция для построения графика
    function buildChart() {
        // Получаем актуальные данные из таблицы (используем уже загруженные, но для надёжности перезапросим)
        // Так как loadData уже вызвана, мы можем использовать глобальные переменные, но проще запросить заново с фильтром.
        // Для простоты используем данные, которые уже загружены в loadData через переменные, но их нет в глобальной области.
        // Поэтому перезапросим данные специально для графика.
        (async () => {
            const rangeStart = getRangeStartDate();
            const rangeEnd = getRangeEndDate();
            const { data: allData, error } = await supabaseClient
                .from('weight_records')
                .select('*')
                .gte('date', rangeStart)
                .lte('date', rangeEnd)
                .order('date', { ascending: true });
            if (error) {
                alert('Ошибка загрузки данных для графика: ' + error.message);
                return;
            }
            // Разделим по персонам
            const tanyaData = allData.filter(r => r.person === 'tanya');
            const katyaData = allData.filter(r => r.person === 'katya');

            // Подготовим данные для Chart.js
            // Объединяем все даты из обеих серий (уникальные)
            const datesSet = new Set();
            tanyaData.forEach(r => datesSet.add(r.date));
            katyaData.forEach(r => datesSet.add(r.date));
            const sortedDates = Array.from(datesSet).sort((a,b) => a.localeCompare(b));

            // Сопоставляем вес по датам
            const tanyaMap = new Map(tanyaData.map(r => [r.date, r.weight]));
            const katyaMap = new Map(katyaData.map(r => [r.date, r.weight]));

            const tanyaWeights = sortedDates.map(d => tanyaMap.has(d) ? tanyaMap.get(d) : null);
            const katyaWeights = sortedDates.map(d => katyaMap.has(d) ? katyaMap.get(d) : null);

            // Уничтожаем старый график, если есть
            if (chartInstance) {
                chartInstance.destroy();
                chartInstance = null;
            }

            const ctx = chartCanvas.getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: sortedDates,
                    datasets: [
                        {
                            label: 'Танюшка',
                            data: tanyaWeights,
                            borderColor: '#e86b8b',
                            backgroundColor: 'rgba(232, 107, 139, 0.1)',
                            borderWidth: 3,
                            pointBackgroundColor: '#e86b8b',
                            tension: 0.1,
                            spanGaps: true,
                        },
                        {
                            label: 'Катюшка',
                            data: katyaWeights,
                            borderColor: '#4a9eff',
                            backgroundColor: 'rgba(74, 158, 255, 0.1)',
                            borderWidth: 3,
                            pointBackgroundColor: '#4a9eff',
                            tension: 0.1,
                            spanGaps: true,
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                usePointStyle: true,
                                pointStyle: 'circle',
                                font: { size: 14 }
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (context.parsed.y !== null) {
                                        label += ': ' + context.parsed.y.toFixed(1) + ' кг';
                                    }
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: {
                                maxRotation: 45,
                                autoSkip: true,
                                maxTicksLimit: 20
                            }
                        },
                        y: {
                            beginAtZero: false,
                            ticks: {
                                callback: function(value) { return value + ' кг'; }
                            }
                        }
                    }
                }
            });
        })();
    }

    async function loadData() {
        try {
            updateRangeInfo();
            const { data, error } = await supabaseClient
                .from('weight_records')
                .select('*')
                .order('date', { ascending: false });
            if (error) throw error;

            const { data: tanyaAll } = await supabaseClient.from('weight_records').select('*').eq('person', 'tanya').order('date', { ascending: true });
            const { data: katyaAll } = await supabaseClient.from('weight_records').select('*').eq('person', 'katya').order('date', { ascending: true });
            updateTotalStats(tanyaAll, katyaAll);

            const rangeStart = getRangeStartDate();
            const rangeEnd = getRangeEndDate();
            const filteredData = data.filter(r => r.date >= rangeStart && r.date <= rangeEnd);

            if (!filteredData || filteredData.length === 0) {
                historyBody.innerHTML = '<tr><td colspan="4" class="empty">📭 Нет записей за выбранный период</td></tr>';
                return;
            }

            const byDate = new Map();
            for (let rec of filteredData) {
                if (!byDate.has(rec.date)) byDate.set(rec.date, { tanya: null, katya: null });
                byDate.get(rec.date)[rec.person] = rec;
            }
            const dates = Array.from(byDate.keys()).sort((a,b) => b.localeCompare(a));
            const tanyaRange = tanyaAll.filter(r => r.date >= rangeStart && r.date <= rangeEnd);
            const katyaRange = katyaAll.filter(r => r.date >= rangeStart && r.date <= rangeEnd);
            const tanyaChanges = new Map();
            const katyaChanges = new Map();
            for (let i = 0; i < tanyaRange.length; i++) {
                if (i > 0) {
                    const diff = tanyaRange[i].weight - tanyaRange[i-1].weight;
                    tanyaChanges.set(tanyaRange[i].date, diff);
                }
            }
            for (let i = 0; i < katyaRange.length; i++) {
                if (i > 0) {
                    const diff = katyaRange[i].weight - katyaRange[i-1].weight;
                    katyaChanges.set(katyaRange[i].date, diff);
                }
            }

            let html = '';
            for (let date of dates) {
                const tanyaRec = byDate.get(date).tanya;
                const katyaRec = byDate.get(date).katya;
                let tanyaHtml = '';
                if (tanyaRec) {
                    const change = tanyaChanges.get(date);
                    let changeHtml = '';
                    if (change !== undefined) {
                        const changeAbs = Math.abs(change).toFixed(1);
                        const arrow = change > 0 ? '▲' : (change < 0 ? '▼' : '●');
                        changeHtml = `<div style="font-size:0.7rem; margin-top:4px; background:${change > 0 ? '#fce4e4' : (change < 0 ? '#e6f4ea' : '#fff0f0')}; color:${change > 0 ? '#c62828' : (change < 0 ? '#2e7d32' : '#b86b82')}; border-radius:20px; padding:2px 6px;">${arrow} ${changeAbs} кг</div>`;
                    } else {
                        changeHtml = `<div style="font-size:0.7rem; margin-top:4px; background:#fff0f0; border-radius:20px; padding:2px 6px;">● первое</div>`;
                    }
                    tanyaHtml = `<div><strong>${tanyaRec.weight} кг</strong></div>${changeHtml}`;
                } else {
                    tanyaHtml = '—';
                }
                let katyaHtml = '';
                if (katyaRec) {
                    const change = katyaChanges.get(date);
                    let changeHtml = '';
                    if (change !== undefined) {
                        const changeAbs = Math.abs(change).toFixed(1);
                        const arrow = change > 0 ? '▲' : (change < 0 ? '▼' : '●');
                        changeHtml = `<div style="font-size:0.7rem; margin-top:4px; background:${change > 0 ? '#fce4e4' : (change < 0 ? '#e6f4ea' : '#fff0f0')}; color:${change > 0 ? '#c62828' : (change < 0 ? '#2e7d32' : '#b86b82')}; border-radius:20px; padding:2px 6px;">${arrow} ${changeAbs} кг</div>`;
                    } else {
                        changeHtml = `<div style="font-size:0.7rem; margin-top:4px; background:#fff0f0; border-radius:20px; padding:2px 6px;">● первое</div>`;
                    }
                    katyaHtml = `<div><strong>${katyaRec.weight} кг</strong></div>${changeHtml}`;
                } else {
                    katyaHtml = '—';
                }
                const delBtn = `<button class="delete" data-date="${date}" data-tanya-id="${tanyaRec ? tanyaRec.id : ''}" data-katya-id="${katyaRec ? katyaRec.id : ''}">✕</button>`;
                html += `<tr><td>${date}</td><td>${tanyaHtml}</td><td>${katyaHtml}</td><td>${delBtn}</td></tr>`;
            }
            historyBody.innerHTML = html;

            document.querySelectorAll('.delete').forEach(btn => {
                btn.onclick = async (e) => {
                    e.stopPropagation();
                    const date = btn.getAttribute('data-date');
                    const tanyaId = btn.getAttribute('data-tanya-id');
                    const katyaId = btn.getAttribute('data-katya-id');
                    if (!confirm(`Удалить все записи за ${date}?`)) return;
                    if (tanyaId && tanyaId !== '') await supabaseClient.from('weight_records').delete().eq('id', tanyaId);
                    if (katyaId && katyaId !== '') await supabaseClient.from('weight_records').delete().eq('id', katyaId);
                    await loadData();
                };
            });
        } catch (err) {
            console.error(err);
            historyBody.innerHTML = `<tr><td colspan="4" class="empty">❌ Ошибка загрузки: ${err.message}</td></tr>`;
        }
    }

    async function saveWeight() {
        const weight = parseFloat(weightInput.value);
        if (isNaN(weight) || weight <= 0 || weight > 300) {
            alert('Введите корректный вес (1-300 кг)');
            return;
        }
        const date = dateInput.value;
        if (!date) {
            alert('Выберите дату');
            return;
        }
        const { data: existing, error: checkErr } = await supabaseClient
            .from('weight_records')
            .select('id')
            .eq('person', currentPerson)
            .eq('date', date)
            .maybeSingle();
        if (checkErr) {
            alert('Ошибка проверки: ' + checkErr.message);
            return;
        }
        if (existing && !confirm(`Запись на ${date} для ${currentPerson === 'tanya' ? 'Танюшки' : 'Катюшки'} уже есть. Заменить?`)) {
            return;
        }
        if (existing) {
            await supabaseClient.from('weight_records').delete().eq('id', existing.id);
        }
        const { error: insertErr } = await supabaseClient
            .from('weight_records')
            .insert([{ person: currentPerson, date: date, weight: weight }]);
        if (insertErr) {
            alert('Ошибка сохранения: ' + insertErr.message);
            return;
        }
        weightInput.value = '';
        await loadData();
        alert('✅ Вес сохранён');
    }

    async function resetAllData() {
        if (!confirm('Удалить ВСЕ записи о весе? Отменить нельзя.')) return;
        const { error } = await supabaseClient.from('weight_records').delete().neq('id', 0);
        if (error) {
            alert('Ошибка очистки: ' + error.message);
        } else {
            await loadData();
            alert('✨ Вся история очищена');
        }
    }
</script>
