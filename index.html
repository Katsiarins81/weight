<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дневник веса - Танюшка и Катюшка</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: linear-gradient(145deg, #fff5f9, #ffe4ed); padding: 20px; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .card { max-width: 900px; margin: auto; background: rgba(255,255,255,0.95); border-radius: 48px; padding: 24px; box-shadow: 0 20px 40px rgba(236,120,144,0.2); border: 1px solid #ffcddc; }
        h1 { text-align: center; background: linear-gradient(135deg, #e86b8b, #c73e5e); background-clip: text; color: transparent; }
        .sub { text-align: center; color: #e68eaa; margin-bottom: 20px; }
        .status { background: #fff0f4; border-radius: 30px; padding: 8px; text-align: center; font-size: 0.8rem; margin-bottom: 16px; }
        .person-buttons { display: flex; gap: 12px; margin-bottom: 24px; }
        .person-btn { flex: 1; background: white; border: none; padding: 12px; border-radius: 60px; font-size: 1.2rem; font-weight: 600; color: #bc5f7a; cursor: pointer; transition: 0.2s; }
        .person-btn.active { background: #ff8aab; color: white; }
        .weight-card { background: white; border-radius: 32px; padding: 20px; text-align: center; border: 1px solid #ffe2ea; margin-bottom: 24px; }
        #selectedName { font-size: 1.8rem; font-weight: 700; margin-bottom: 16px; }
        .input-area { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin: 16px 0; }
        .input-area input { border: 2px solid #ffcddc; border-radius: 56px; padding: 12px 18px; font-size: 1.3rem; width: 140px; text-align: center; }
        .date-picker { display: flex; justify-content: center; gap: 12px; background: #fff5f8; border-radius: 60px; padding: 8px 16px; width: fit-content; margin: 10px auto 0; }
        .save-btn { background: linear-gradient(95deg, #ff8aab, #ff6085); border: none; padding: 12px 28px; border-radius: 60px; font-size: 1.1rem; font-weight: bold; color: white; margin-top: 18px; cursor: pointer; width: 80%; }
        .history-section { background: #ffffffd9; border-radius: 32px; padding: 16px; border: 1px solid #ffcbdb; overflow-x: auto; }
        .history-header { display: flex; justify-content: space-between; margin-bottom: 16px; }
        .reset-btn { background: none; border: none; color: #e68eaa; text-decoration: underline; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #ffe2ea; }
        th { background: #fff0f4; color: #bc5f7a; }
        .delete { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #e68eaa; }
        .empty { text-align: center; padding: 28px; color: #e6a1b7; }
        footer { text-align: center; margin-top: 20px; font-size: 0.7rem; color: #e6a1b7; }
    </style>
</head>
<body>
<div class="card">
    <h1>Дневник веса</h1>
    <div class="sub">Танюшка 🎀 и Катюшка 🌸</div>
    <div id="statusMsg" class="status">🔄 Проверка подключения...</div>

    <div class="person-buttons">
        <button id="btnTanya" class="person-btn active">🎀 Танюшка</button>
        <button id="btnKatya" class="person-btn">🌸 Катюшка</button>
    </div>

    <div class="weight-card">
        <div id="selectedName">🎀 Танюшка</div>
        <div class="input-area">
            <input type="number" id="weightInput" step="0.1" placeholder="вес">
            <span class="kg-unit">кг</span>
        </div>
        <div class="date-picker">
            <label>📅 Дата:</label>
            <input type="date" id="datePicker">
            <button id="todayBtn" style="background:#ff94b0; border:none; border-radius:40px; padding:0 12px; color:white;">Сегодня</button>
        </div>
        <button id="saveBtn" class="save-btn">💾 Сохранить вес</button>
    </div>

    <div class="history-section">
        <div class="history-header">
            <h3>📋 Динамика веса</h3>
            <button id="resetAllBtn" class="reset-btn">Очистить всё</button>
        </div>
        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th>📅 Дата</th><th>🎀 Танюшка</th><th>🌸 Катюшка</th><th></th></tr></thead>
                <tbody id="historyBody"><tr><td colspan="4" class="empty">Загрузка...</td></tr></tbody>
            </table>
        </div>
    </div>
    <footer>🟢 Зелёный - снижение веса, 🔴 Красный - прирост</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // ==================== НАСТРОЙКИ (ЗАМЕНИТЕ НА СВОИ) ====================
    const MY_SUPABASE_URL = "https://dumititxmlefeldvmvmg.supabase.co";
    const MY_SUPABASE_KEY = "sb_publishable_WOtfNa5PZ5Cyb-zg5WUgwg_hagk9wX7";
    // ====================================================================


    // Инициализация Supabase
    const supabaseClient = window.supabase.createClient(MY_SUPABASE_URL, MY_SUPABASE_KEY);
    
    // Состояние
    let currentPerson = "tanya";  // 'tanya' или 'katya'
    let currentDate = new Date().toISOString().slice(0,10);
    
    // DOM элементы
    const btnTanya = document.getElementById('btnTanya');
    const btnKatya = document.getElementById('btnKatya');
    const selectedNameDiv = document.getElementById('selectedName');
    const weightInput = document.getElementById('weightInput');
    const datePicker = document.getElementById('datePicker');
    const todayBtn = document.getElementById('todayBtn');
    const saveBtn = document.getElementById('saveBtn');
    const resetAllBtn = document.getElementById('resetAllBtn');
    const historyBody = document.getElementById('historyBody');
    const statusMsg = document.getElementById('statusMsg');

    // ========== ПЕРЕКЛЮЧЕНИЕ ПЕРСОНЫ (ГАРАНТИРОВАННО РАБОТАЕТ) ==========
    function switchToTanya() {
        currentPerson = "tanya";
        btnTanya.classList.add('active');
        btnKatya.classList.remove('active');
        selectedNameDiv.innerHTML = '🎀 Танюшка';
        console.log("Переключили на Танюшку"); // для проверки в консоли
    }
    
    function switchToKatya() {
        currentPerson = "katya";
        btnKatya.classList.add('active');
        btnTanya.classList.remove('active');
        selectedNameDiv.innerHTML = '🌸 Катюшка';
        console.log("Переключили на Катюшку");
    }
    
    btnTanya.onclick = switchToTanya;
    btnKatya.onclick = switchToKatya;
    
    // ========== РАБОТА С БАЗОЙ ==========
    async function loadData() {
        try {
            const { data, error } = await supabaseClient
                .from('weight_records')
                .select('*')
                .order('date', { ascending: false });
                
            if (error) throw error;
            
            if (!data || data.length === 0) {
                historyBody.innerHTML = '<tr><td colspan="4" class="empty">📭 Нет записей. Добавьте первую!</td></tr>';
                statusMsg.innerHTML = '✅ Подключено, но записей пока нет';
                return;
            }
            
            // Группируем по датам
            const byDate = new Map();
            for (let rec of data) {
                if (!byDate.has(rec.date)) byDate.set(rec.date, { tanya: null, katya: null });
                byDate.get(rec.date)[rec.person] = rec;
            }
            
            const dates = Array.from(byDate.keys()).sort((a,b) => b.localeCompare(a));
            let html = '';
            for (let date of dates) {
                const tanyaRec = byDate.get(date).tanya;
                const katyaRec = byDate.get(date).katya;
                const tanyaWeight = tanyaRec ? tanyaRec.weight : null;
                const katyaWeight = katyaRec ? katyaRec.weight : null;
                
                // Для изменений относительно предыдущих записей (просто показываем вес)
                let tanyaCell = tanyaWeight ? `<strong>${tanyaWeight} кг</strong>` : '—';
                let katyaCell = katyaWeight ? `<strong>${katyaWeight} кг</strong>` : '—';
                
                // Кнопка удаления для всей даты
                const delBtn = `<button class="delete" data-date="${date}" data-tanya-id="${tanyaRec ? tanyaRec.id : ''}" data-katya-id="${katyaRec ? katyaRec.id : ''}">✕</button>`;
                html += `<tr><td>${date}</td><td>${tanyaCell}</td><td>${katyaCell}</td><td>${delBtn}</td></tr>`;
            }
            historyBody.innerHTML = html;
            statusMsg.innerHTML = `✅ Данные загружены (${data.length} записей)`;
            
            // Навесить обработчики на кнопки удаления
            document.querySelectorAll('.delete').forEach(btn => {
                btn.onclick = async (e) => {
                    e.stopPropagation();
                    const date = btn.dataset.date;
                    const tanyaId = btn.dataset.tanyaId;
                    const katyaId = btn.dataset.katyaId;
                    if (!confirm(`Удалить все записи за ${date}?`)) return;
                    if (tanyaId) await supabaseClient.from('weight_records').delete().eq('id', tanyaId);
                    if (katyaId) await supabaseClient.from('weight_records').delete().eq('id', katyaId);
                    await loadData();
                };
            });
        } catch (err) {
            console.error(err);
            historyBody.innerHTML = `<tr><td colspan="4" class="empty">❌ Ошибка загрузки: ${err.message}</td></tr>`;
            statusMsg.innerHTML = '❌ Ошибка подключения к Supabase';
        }
    }
    
    async function saveWeight() {
        const weight = parseFloat(weightInput.value);
        if (isNaN(weight) || weight <= 0 || weight > 300) {
            alert('Введите корректный вес (от 1 до 300 кг)');
            return;
        }
        const date = datePicker.value;
        if (!date) {
            alert('Выберите дату');
            return;
        }
        
        // Проверяем, есть ли уже запись на эту дату для этой персоны
        const { data: existing, error: checkError } = await supabaseClient
            .from('weight_records')
            .select('id')
            .eq('person', currentPerson)
            .eq('date', date)
            .maybeSingle();
        
        if (checkError) {
            alert('Ошибка проверки: ' + checkError.message);
            return;
        }
        
        if (existing && !confirm(`Запись на ${date} для ${currentPerson === 'tanya' ? 'Танюшки' : 'Катюшки'} уже существует (заменить?)`)) {
            return;
        }
        
        if (existing) {
            await supabaseClient.from('weight_records').delete().eq('id', existing.id);
        }
        
        const { error: insertError } = await supabaseClient
            .from('weight_records')
            .insert([{ person: currentPerson, date: date, weight: weight }]);
            
        if (insertError) {
            alert('Ошибка сохранения: ' + insertError.message);
            return;
        }
        
        weightInput.value = '';
        await loadData();
        alert('✅ Вес сохранён!');
    }
    
    async function resetAllData() {
        if (!confirm('ВНИМАНИЕ! Это удалит ВСЕ записи о весе. Продолжить?')) return;
        const { error } = await supabaseClient.from('weight_records').delete().neq('id', 0);
        if (error) {
            alert('Ошибка очистки: ' + error.message);
        } else {
            await loadData();
            alert('✨ Вся история очищена');
        }
    }
    
    // Инициализация даты и кнопок
    function initDate() {
        datePicker.value = currentDate;
        datePicker.onchange = () => { currentDate = datePicker.value; };
        todayBtn.onclick = () => {
            const today = new Date().toISOString().slice(0,10);
            currentDate = today;
            datePicker.value = today;
        };
    }
    
    // Запуск приложения
    (async function() {
        initDate();
        await loadData();
        // Устанавливаем начальную персону
        switchToTanya();
        saveBtn.onclick = saveWeight;
        resetAllBtn.onclick = resetAllData;
        // Проверка подключения
        const { error } = await supabaseClient.from('weight_records').select('id', { count: 'exact', head: true });
        if (error) {
            statusMsg.innerHTML = '❌ Ошибка подключения к Supabase. Проверьте URL и anon key.';
        } else {
            statusMsg.innerHTML = '✅ Подключено к Supabase';
        }
    })();
</script>
</body>
</html>
